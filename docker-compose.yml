services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wallet_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file:
      - .env
    environment:
      APP_WORKERS: 2
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/wallet_service
      DB_POOL_SIZE: 5
      DB_MAX_OVERFLOW: 5
      DB_STATEMENT_CACHE_SIZE: 100
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
